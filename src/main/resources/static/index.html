<!DOCTYPE html>

<html>
<head>
    <title>Code Collab Editor</title>

```
<style>
    body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #0f1117;
        color: white;
    }

    #topbar {
        padding: 10px;
        background: #161a22;
        display: flex;
        gap: 10px;
        align-items: center;
        border-bottom: 1px solid #2a2f3a;
    }

    input, select {
        padding: 8px;
        border-radius: 6px;
        border: none;
        outline: none;
        background: #1e2430;
        color: white;
    }

    button {
        padding: 8px 12px;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        background: #3b82f6;
        color: white;
    }

    #userCount {
        margin-left: auto;
        color: #22c55e;
        font-weight: bold;
    }

    #main {
        flex: 1;
        display: flex;
    }

    #container {
        flex: 3;
    }

    #chatPanel {
        flex: 1;
        background: #111827;
        display: flex;
        flex-direction: column;
    }

    #users, #messages, #activity {
        padding: 10px;
        overflow-y: auto;
    }

    #output-container {
        height: 170px;
        background: #0b0f17;
        padding: 10px;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
```

</head>

<body>

<div id="topbar">
    <button onclick="runCode()">Run</button>

```
<select id="lang">
    <option value="java">Java</option>
    <option value="python">Python</option>
    <option value="cpp">C++</option>
</select>

<input id="room" placeholder="Room ID" />
<input id="user" placeholder="Your Name" />

<button onclick="joinRoom()">Join Room</button>

<span id="userCount">Users: 0</span>
```

</div>

<div id="main">
    <div id="container"></div>

```
<div id="chatPanel">
    <div>Users</div>
    <div id="users"></div>

    <div>Chat</div>
    <div id="messages"></div>

    <input id="chatInput" placeholder="Type message..." />
    <button onclick="sendChat()">Send</button>
</div>
```

</div>

<div id="output-container">
    <pre id="output">Click Run to execute code</pre>
</div>

<script>

let editor;
let socket;
let ignore = false;

const BASE_URL = "https://code-collab-production.up.railway.app";

require.config({
    paths: { vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs" }
});

require(["vs/editor/editor.main"], function () {

    editor = monaco.editor.create(document.getElementById("container"), {
        value: `public class Main {
    public static void main(String[] args) {
        System.out.println("Hello World");
    }
}`,
        language: "java",
        theme: "vs-dark"
    });

    editor.onDidChangeModelContent(() => {

        if (!socket || socket.readyState !== 1 || ignore) return;

        socket.send(JSON.stringify({
            type: "code",
            room: document.getElementById("room").value,
            user: document.getElementById("user").value,
            content: editor.getValue()
        }));
    });
});

function joinRoom() {

    const room = document.getElementById("room").value.trim();
    const user = document.getElementById("user").value.trim();

    if (!room || !user) {
        alert("Enter Room ID and Name");
        return;
    }

    socket = new WebSocket(`wss://code-collab-production.up.railway.app/ws`);

    socket.onopen = () => {
        socket.send(JSON.stringify({ type: "join", room, user }));
    };

    socket.onmessage = (event) => {

        const msg = JSON.parse(event.data);

        if (msg.type === "code") {
            if (editor.getValue() !== msg.content) {
                ignore = true;
                editor.setValue(msg.content);
                ignore = false;
            }
        }

        if (msg.type === "chat") {
            const div = document.createElement("div");
            div.innerText = msg.user + ": " + msg.content;
            document.getElementById("messages").appendChild(div);
        }

        if (msg.type === "users") {
            document.getElementById("userCount").innerText = "Users: " + msg.count;
            document.getElementById("users").innerText = msg.users.join(", ");
        }
    };
}

function sendChat() {

    const text = document.getElementById("chatInput").value.trim();
    if (!text || !socket) return;

    socket.send(JSON.stringify({
        type: "chat",
        room: document.getElementById("room").value,
        user: document.getElementById("user").value,
        content: text
    }));

    document.getElementById("chatInput").value = "";
}

function runCode() {

    document.getElementById("output").innerText = "Running...";

    fetch(`${BASE_URL}/run`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            language: document.getElementById("lang").value,
            code: editor.getValue()
        })
    })
    .then(res => res.text())
    .then(data => {
        document.getElementById("output").innerText = data;
    })
    .catch(err => {
        document.getElementById("output").innerText = "Error running code";
    });
}

</script>

</body>
</html>
